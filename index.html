<style>
:root {
  --bg:#07070d; --s1:#10101a; --s2:#171724; --s3:#1e1e2e;
  --border:#28283c; --border2:#34344a;
  --accent:#f5c842; --accent2:#3de8a0; --accent3:#7c6fff;
  --danger:#f04f5e; --warn:#f0933a;
  --text:#eeeef8; --muted:#6868a0; --muted2:#9090c0;
  --mono:'Space Mono',monospace; --sans:'DM Sans',sans-serif;
  --r:8px; --r2:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:3px;display:flex;align-items:center;gap:8px}
.brand-dot{width:8px;height:8px;background:var(--accent2);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.topbar-r{display:flex;align-items:center;gap:10px}
.rbadge{font-family:var(--mono);font-size:9px;padding:3px 8px;border-radius:20px;border:1px solid;letter-spacing:1px}
.rbadge.admin{border-color:var(--accent);color:var(--accent)}
.rbadge.supervisor{border-color:var(--accent2);color:var(--accent2)}
.btn-out{font-family:var(--mono);font-size:9px;padding:4px 10px;border-radius:4px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.btn-out:hover{border-color:var(--danger);color:var(--danger)}
.main{flex:1;padding:22px 20px;max-width:1140px;margin:0 auto;width:100%}

/* ── LOGIN ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#1a1a30 0%,var(--bg) 70%)}
.login-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:360px}
.login-logo{font-family:var(--mono);font-size:24px;color:var(--accent);letter-spacing:3px;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:32px}

/* ── FORM ── */
.fg{margin-bottom:14px}
.fg label{display:block;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg input::placeholder{color:var(--muted)}
.fg select option{background:var(--s2)}
.fg textarea{resize:vertical;min-height:70px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── BUTTONS ── */
.btn{font-family:var(--mono);font-size:11px;letter-spacing:.5px;padding:9px 16px;border-radius:var(--r);border:none;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--accent);color:#07070d;font-weight:700}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-success{background:transparent;border:1px solid var(--accent2);color:var(--accent2)}
.btn-success:hover{background:var(--accent2);color:#07070d}
.btn-danger{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-danger:hover{border-color:var(--danger);color:var(--danger)}
.btn-sm{font-size:10px;padding:6px 12px}
.btn-full{width:100%;justify-content:center}

/* ── TABS ── */
.tabs{display:flex;gap:2px;margin-bottom:22px;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:9px 14px;background:transparent;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;text-transform:uppercase}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px}
.card+.card{margin-top:14px}
.ct{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mb14{margin-bottom:14px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase}
.stat-n{font-family:var(--mono);font-size:28px;color:var(--accent);line-height:1}
.stat-l{font-size:11px;color:var(--muted);margin-top:4px}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tbody tr:hover td{background:var(--s2)}
tbody tr:last-child td{border-bottom:none}
.mc{font-family:var(--mono);font-size:11px}
.badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;letter-spacing:.5px;padding:2px 8px;border-radius:20px;border:1px solid}
.b-green{border-color:var(--accent2);color:var(--accent2)}
.b-yellow{border-color:var(--accent);color:var(--accent)}
.b-red{border-color:var(--danger);color:var(--danger)}
.b-gray{border-color:var(--border2);color:var(--muted2)}
.b-purple{border-color:var(--accent3);color:var(--accent3)}

/* ── SEARCH ── */
.sbar{display:flex;gap:8px;margin-bottom:14px}
.sbar input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none}
.sbar input:focus{border-color:var(--accent)}

/* ── EMP CARD ── */
.erow{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:3px}
.erow:hover{background:var(--s2);border-color:var(--border)}
.erow.sel{background:var(--s2);border-color:var(--accent2)}
.avt{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:12px;color:#07070d;flex-shrink:0}
.avt-y{background:var(--accent)}
.avt-g{background:var(--accent2)}
.avt-p{background:var(--accent3)}
.ei{flex:1;min-width:0}
.en{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.er{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}
.etok{font-family:var(--mono);font-size:15px;color:var(--accent);text-align:right}
.etl{font-size:9px;color:var(--muted);text-align:right}

/* ── SCANNER ── */
.scanbox{border:2px dashed var(--border2);border-radius:var(--r2);padding:28px 20px;text-align:center;transition:all .2s}
.scanbox.live{border-color:var(--accent2);background:rgba(61,232,160,.03)}
.scanbox.err{border-color:var(--danger);background:rgba(240,79,94,.03)}
.scan-icon{font-size:36px;margin-bottom:10px}
.scan-input{width:100%;max-width:260px;background:var(--s2);border:1px solid var(--accent);border-radius:var(--r);padding:10px 14px;color:var(--text);font-family:var(--mono);font-size:14px;outline:none;text-align:center;letter-spacing:2px;margin-bottom:12px}
.scan-hint{font-size:12px;color:var(--muted);margin-bottom:14px}

/* ── CAMERA ── */
.cam-wrap{position:relative;border-radius:var(--r2);overflow:hidden;background:#000;margin-bottom:12px}
.cam-wrap video{width:100%;display:block;max-height:240px;object-fit:cover}
.cam-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:150px;height:150px;border:3px solid var(--accent2);border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
.cam-line{position:absolute;left:50%;transform:translateX(-50%);width:130px;height:2px;background:var(--accent2);opacity:.9;animation:scan 1.8s linear infinite}
@keyframes scan{0%{top:calc(50% - 75px)}100%{top:calc(50% + 75px)}}
.cam-foot{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);padding:7px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--accent2)}

/* ── VERIFY STATES ── */
.verify-badge{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;border-radius:var(--r);margin-bottom:14px;font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:1px}
.vb-success{background:rgba(61,232,160,.1);border:1px solid var(--accent2);color:var(--accent2)}
.vb-error{background:rgba(240,79,94,.1);border:1px solid var(--danger);color:var(--danger)}
.vb-info{background:rgba(245,200,66,.1);border:1px solid var(--accent);color:var(--accent)}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.modal-footer{display:flex;gap:8px;margin-top:20px}
.qr-center{display:flex;justify-content:center;margin:12px 0}

/* ── QR ID CARD ── */
.id-card{background:linear-gradient(135deg,var(--s2) 0%,var(--s3) 100%);border:1px solid var(--border2);border-radius:12px;padding:20px;width:280px;margin:0 auto}
.id-card-top{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.id-brand{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:2px}
.id-role{font-size:10px;color:var(--muted);margin-top:1px}
.id-name{font-size:16px;font-weight:600;margin-bottom:2px}
.id-detail{font-family:var(--mono);font-size:10px;color:var(--muted2)}
.id-qr{display:flex;justify-content:center;margin:14px 0 10px}

/* ── SESSION LOG ── */
.slog-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.slog-item:last-child{border-bottom:none}

/* ── TOASTS ── */
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:300}
.toast{font-size:12px;padding:10px 16px;border-radius:var(--r);border:1px solid;animation:tin .2s ease;max-width:300px}
.toast.success{background:rgba(61,232,160,.1);border-color:var(--accent2);color:var(--accent2)}
.toast.error{background:rgba(240,79,94,.1);border-color:var(--danger);color:var(--danger)}
.toast.info{background:rgba(245,200,66,.1);border-color:var(--accent);color:var(--accent)}
@keyframes tin{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── DEMO BANNER ── */
.demo-banner{background:rgba(245,200,66,.07);border:1px solid rgba(245,200,66,.3);border-radius:var(--r);padding:10px 14px;margin-bottom:18px;font-size:11px;color:var(--accent);font-family:var(--mono)}

/* ── SUCCESS ANIM ── */
@keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.pop{animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}

/* ── DIVIDER ── */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.err-msg{font-size:11px;color:var(--danger);margin-top:8px;text-align:center}

@media(max-width:640px){
  .g2,.g3,.g4,.fg-row,.fg-row3{grid-template-columns:1fr}
  .main{padding:14px}
  .topbar{padding:0 14px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ═══════════════════════════════════════════════════
// DEMO DATA
// ═══════════════════════════════════════════════════
let DB = (() => {
  const employees = [
    {id:'EMP001',name:'Arun Kumar',rollNo:'ROLL0001',mobile:'9876543210',department:'Production',tokens:[],totalTokens:5,paidTokens:42,createdAt:'2024-01-10'},
    {id:'EMP002',name:'Priya Sharma',rollNo:'ROLL0002',mobile:'9123456789',department:'Packing',tokens:[],totalTokens:3,paidTokens:38,createdAt:'2024-01-10'},
    {id:'EMP003',name:'Karthik R',rollNo:'ROLL0003',mobile:'',department:'Quality',tokens:[],totalTokens:7,paidTokens:55,createdAt:'2024-01-11'},
    {id:'EMP004',name:'Deepa M',rollNo:'ROLL0004',mobile:'9988776655',department:'Warehouse',tokens:[],totalTokens:2,paidTokens:30,createdAt:'2024-01-12'},
    {id:'EMP005',name:'Suresh P',rollNo:'ROLL0005',mobile:'',department:'Maintenance',tokens:[],totalTokens:9,paidTokens:61,createdAt:'2024-01-12'},
  ];
  const tokens = Array.from({length:100},(_,i)=>({
    id:`TKN${String(i+1).padStart(6,'0')}`,
    assignedTo:null,assignedRoll:null,assignedAt:null,assignedBy:null,sessionId:null,lockedDate:null
  }));
  const supervisors = [
    {id:'SUP001',name:'Supervisor Alpha',username:'sup1',password:'pass1',qrId:'SUPQR001',active:true},
    {id:'SUP002',name:'Supervisor Beta',username:'sup2',password:'pass2',qrId:'SUPQR002',active:true},
  ];
  return {employees,tokens,supervisors};
})();

const today = () => new Date().toISOString().split('T')[0];

// ═══════════════════════════════════════════════════
// DB API (demo — swap with Firestore in production)
// ═══════════════════════════════════════════════════
const db = {
  login:(u,p)=>{
    if(u==='admin'&&p==='admin123') return Promise.resolve({role:'admin',name:'Administrator',id:'ADMIN'});
    const s=DB.supervisors.find(s=>s.username===u&&s.password===p);
    if(s) return Promise.resolve({role:'supervisor',name:s.name,id:s.id,qrId:s.qrId});
    return Promise.reject(new Error('Invalid credentials'));
  },
  loginByQR:(qrId)=>{
    const s=DB.supervisors.find(s=>s.qrId===qrId&&s.active);
    if(s) return Promise.resolve({role:'supervisor',name:s.name,id:s.id,qrId:s.qrId});
    return Promise.reject(new Error('Supervisor QR not recognised'));
  },
  getEmployees:()=>Promise.resolve([...DB.employees]),
  getEmployeeByRoll:(rollNo)=>Promise.resolve(DB.employees.find(e=>e.rollNo===rollNo.trim())||null),
  getEmployeeById:(id)=>Promise.resolve(DB.employees.find(e=>e.id===id)||null),
  addEmployee:(emp)=>{DB.employees.push(emp);return Promise.resolve();},
  removeEmployee:(id)=>{DB.employees=DB.employees.filter(e=>e.id!==id);return Promise.resolve();},
  getTokens:()=>Promise.resolve([...DB.tokens]),
  getToken:(id)=>Promise.resolve(DB.tokens.find(t=>t.id===id)||null),
  assignToken:(tokenId,empId,rollNo,supName,sessionId)=>{
    const t=DB.tokens.find(t=>t.id===tokenId);
    if(!t) return Promise.reject(new Error('Token not found'));
    if(t.assignedTo&&t.lockedDate===today()) return Promise.reject(new Error(`Token already used today by ${t.assignedTo}`));
    if(t.assignedTo&&t.lockedDate!==today()) return Promise.reject(new Error('Token locked — reset by admin required'));
    t.assignedTo=empId;t.assignedRoll=rollNo;t.assignedAt=new Date().toISOString();
    t.assignedBy=supName;t.sessionId=sessionId;t.lockedDate=today();
    const e=DB.employees.find(e=>e.id===empId);
    if(e){e.tokens.push(tokenId);e.totalTokens=(e.totalTokens||0)+1;}
    return Promise.resolve();
  },
  resetEmployee:(id)=>{
    const e=DB.employees.find(e=>e.id===id);
    if(e){
      DB.tokens.forEach(t=>{if(t.assignedTo===id){t.assignedTo=null;t.assignedRoll=null;t.assignedAt=null;t.assignedBy=null;t.sessionId=null;t.lockedDate=null;}});
      e.paidTokens=(e.paidTokens||0)+e.totalTokens;e.tokens=[];e.totalTokens=0;
    }
    return Promise.resolve();
  },
  getSupervisors:()=>Promise.resolve([...DB.supervisors]),
  addSupervisor:(s)=>{DB.supervisors.push(s);return Promise.resolve();},
  removeSupervisor:(id)=>{DB.supervisors=DB.supervisors.filter(s=>s.id!==id);return Promise.resolve();},
};

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function useToast(){
  const[toasts,setToasts]=useState([]);
  const show=(msg,type='info')=>{const id=Date.now();setToasts(t=>[...t,{id,msg,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);};
  return{toasts,show};
}

function CamScanner({onScan,onClose,label=''}){
  const vidRef=useRef();const canRef=useRef();const streamRef=useRef();const animRef=useRef();
  const[status,setStatus]=useState('Starting camera...');
  const[camErr,setCamErr]=useState(null);
  const lastRef=useRef('');
  useEffect(()=>{
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{
      streamRef.current=stream;
      if(vidRef.current){vidRef.current.srcObject=stream;vidRef.current.play();setStatus(label||'Point at QR code...');}
      animRef.current=requestAnimationFrame(tick);
    }).catch(()=>setCamErr('Camera access denied. Use manual input below.'));
    return()=>{streamRef.current?.getTracks().forEach(t=>t.stop());cancelAnimationFrame(animRef.current);};
  },[]);
  const tick=()=>{
    const v=vidRef.current,c=canRef.current;
    if(v&&c&&v.readyState===v.HAVE_ENOUGH_DATA){
      c.width=v.videoWidth;c.height=v.videoHeight;
      c.getContext('2d').drawImage(v,0,0);
      const img=c.getContext('2d').getImageData(0,0,c.width,c.height);
      const code=window.jsQR&&window.jsQR(img.data,img.width,img.height);
      if(code&&code.data&&code.data!==lastRef.current){
        lastRef.current=code.data;setStatus('✓ Scanned: '+code.data);
        onScan(code.data);
        setTimeout(()=>{lastRef.current='';setStatus(label||'Ready for next scan...');},2000);
      }
    }
    animRef.current=requestAnimationFrame(tick);
  };
  return(
    <div>
      <div className="cam-wrap">
        {camErr?<div style={{padding:32,textAlign:'center',color:'var(--danger)',fontSize:13}}>{camErr}</div>:(
          <>
            <video ref={vidRef} playsInline muted style={{width:'100%',maxHeight:240,objectFit:'cover',display:'block'}}/>
            <canvas ref={canRef} style={{display:'none'}}/>
            <div className="cam-frame"/><div className="cam-line"/>
            <div className="cam-foot">{status}</div>
          </>
        )}
      </div>
      <button className="btn btn-danger btn-sm" onClick={onClose}>✕ Close camera</button>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════════
function Login({onLogin}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');const[busy,setBusy]=useState(false);
  const[camOpen,setCamOpen]=useState(false);
  const go=async()=>{
    if(!u||!p){setErr('Enter username and password');return;}
    setBusy(true);setErr('');
    try{onLogin(await db.login(u.trim(),p));}
    catch(e){setErr(e.message);}finally{setBusy(false);}
  };
  const handleQR=async(val)=>{
    setCamOpen(false);
    try{onLogin(await db.loginByQR(val.trim()));}
    catch(e){setErr(e.message);}
  };
  return(
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo">⬡ TOKENPAY</div>
        <div className="login-sub">Workforce Token System v3</div>
        {camOpen?(
          <CamScanner onScan={handleQR} onClose={()=>setCamOpen(false)} label="Scan supervisor QR ID card..."/>
        ):(
          <>
            <div className="fg"><label>Username</label><input value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="admin / sup1 / sup2" autoFocus/></div>
            <div className="fg"><label>Password</label><input type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="••••••••"/></div>
            <button className="btn btn-primary btn-full" onClick={go} disabled={busy} style={{marginBottom:10}}>{busy?'Signing in...':'Sign In'}</button>
            <button className="btn btn-ghost btn-full" onClick={()=>setCamOpen(true)}>📷 Scan Supervisor QR Card</button>
          </>
        )}
        {err&&<div className="err-msg">{err}</div>}
        <div style={{marginTop:18,fontSize:10,color:'var(--muted)',textAlign:'center',fontFamily:'var(--mono)'}}>DEMO · admin/admin123 · sup1/pass1</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// ADMIN — ADD EMPLOYEE MODAL (scan QR then fill form)
// ═══════════════════════════════════════════════════
function AddEmployeeModal({onClose,onSaved,toast}){
  const[step,setStep]=useState('scan'); // scan | form
  const[scannedQR,setScannedQR]=useState('');
  const[camOpen,setCamOpen]=useState(false);
  const[manualQR,setManualQR]=useState('');
  const[form,setForm]=useState({name:'',rollNo:'',mobile:'',department:''});
  const[busy,setBusy]=useState(false);

  const handleQRScan=async(val)=>{
    setCamOpen(false);
    const qr=val.trim();
    // check if already registered
    const existing=await db.getEmployeeByRoll(qr);
    if(existing){toast.show('This QR is already registered to '+existing.name,'error');return;}
    setScannedQR(qr);setForm(f=>({...f,rollNo:qr}));setStep('form');
  };

  const handleManual=async()=>{
    if(!manualQR.trim()){toast.show('Enter QR value','error');return;}
    handleQRScan(manualQR.trim());
  };

  const save=async()=>{
    if(!form.name||!form.rollNo){toast.show('Name and Roll No required','error');return;}
    setBusy(true);
    try{
      const id=`EMP${String(Date.now()).slice(-6)}`;
      await db.addEmployee({id,name:form.name,rollNo:form.rollNo,mobile:form.mobile,department:form.department,tokens:[],totalTokens:0,paidTokens:0,createdAt:today()});
      toast.show('Employee registered!','success');
      onSaved();onClose();
    }catch(e){toast.show(e.message,'error');}finally{setBusy(false);}
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Register New Employee</div>

        {step==='scan'&&(
          <>
            <div className="verify-badge vb-info">📋 Step 1: Scan or enter the employee QR</div>
            {camOpen?(
              <CamScanner onScan={handleQRScan} onClose={()=>setCamOpen(false)} label="Scan employee QR card..."/>
            ):(
              <div className="scanbox">
                <div className="scan-icon">🪪</div>
                <div className="scan-hint">Scan the physical QR card the employee carries, or enter its value manually.</div>
                <input className="scan-input" value={manualQR} onChange={e=>setManualQR(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleManual()} placeholder="Scan or type QR value"/>
                <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:12}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setCamOpen(true)}>📷 Camera</button>
                  <button className="btn btn-success btn-sm" onClick={handleManual}>→ Continue</button>
                </div>
              </div>
            )}
          </>
        )}

        {step==='form'&&(
          <>
            <div className="verify-badge vb-success pop">✓ QR Scanned: {scannedQR}</div>
            <div className="fg"><label>Full Name *</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Employee full name" autoFocus/></div>
            <div className="fg-row">
              <div className="fg"><label>Roll / Employee ID *</label><input value={form.rollNo} onChange={e=>setForm({...form,rollNo:e.target.value})} placeholder="Auto-filled from QR"/></div>
              <div className="fg"><label>Mobile (optional)</label><input value={form.mobile} onChange={e=>setForm({...form,mobile:e.target.value})} placeholder="10-digit number" maxLength={10}/></div>
            </div>
            <div className="fg"><label>Department</label><input value={form.department} onChange={e=>setForm({...form,department:e.target.value})} placeholder="Production, Packing..."/></div>
          </>
        )}

        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          {step==='form'&&<button className="btn btn-primary" onClick={save} disabled={busy}>{busy?'Saving...':'✓ Save Employee'}</button>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// ADMIN — ADD SUPERVISOR MODAL (same flow as employee)
// ═══════════════════════════════════════════════════
function AddSupervisorModal({onClose,onSaved,toast}){
  const[step,setStep]=useState('scan'); // scan | form
  const[scannedQR,setScannedQR]=useState('');
  const[camOpen,setCamOpen]=useState(false);
  const[manualQR,setManualQR]=useState('');
  const[form,setForm]=useState({name:'',supId:'',mobile:'',username:'',password:''});
  const[busy,setBusy]=useState(false);

  const handleQRScan=async(val)=>{
    setCamOpen(false);
    const qr=val.trim();
    // check if QR already registered as a supervisor
    const existing=await db.getSupervisors();
    if(existing.find(s=>s.qrId===qr)){toast.show('This QR is already registered to a supervisor','error');return;}
    setScannedQR(qr);
    setForm(f=>({...f,supId:qr}));
    setStep('form');
  };

  const handleManual=()=>{
    if(!manualQR.trim()){toast.show('Enter QR value','error');return;}
    handleQRScan(manualQR.trim());
  };

  const save=async()=>{
    if(!form.name||!form.username||!form.password){toast.show('Name, username and password are required','error');return;}
    const existing=await db.getSupervisors();
    if(existing.find(s=>s.username===form.username)){toast.show('Username already taken','error');return;}
    setBusy(true);
    try{
      const id=`SUP${String(Date.now()).slice(-6)}`;
      await db.addSupervisor({id,name:form.name,supId:form.supId,mobile:form.mobile,username:form.username,password:form.password,qrId:scannedQR,active:true});
      toast.show('Supervisor registered!','success');
      onSaved();onClose();
    }catch(e){toast.show(e.message,'error');}finally{setBusy(false);}
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Register New Supervisor</div>

        {step==='scan'&&(
          <>
            <div className="verify-badge vb-info">📋 Step 1: Scan or enter the supervisor's QR card</div>
            {camOpen?(
              <CamScanner onScan={handleQRScan} onClose={()=>setCamOpen(false)} label="Scan supervisor QR card..."/>
            ):(
              <div className="scanbox">
                <div className="scan-icon">🪪</div>
                <div className="scan-hint">Scan the physical QR card the supervisor carries, or enter its value manually.</div>
                <input className="scan-input" value={manualQR} onChange={e=>setManualQR(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleManual()} placeholder="Scan or type QR value" autoFocus/>
                <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:12}}>
                  <button className="btn btn-ghost btn-sm" onClick={()=>setCamOpen(true)}>📷 Camera</button>
                  <button className="btn btn-success btn-sm" onClick={handleManual}>→ Continue</button>
                </div>
              </div>
            )}
          </>
        )}

        {step==='form'&&(
          <>
            <div className="verify-badge vb-success pop">✓ QR Scanned: {scannedQR}</div>
            <div className="fg"><label>Full Name *</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Supervisor full name" autoFocus/></div>
            <div className="fg-row">
              <div className="fg"><label>Supervisor ID</label><input value={form.supId} onChange={e=>setForm({...form,supId:e.target.value})} placeholder="Auto-filled from QR"/></div>
              <div className="fg"><label>Mobile (optional)</label><input value={form.mobile} onChange={e=>setForm({...form,mobile:e.target.value})} placeholder="10-digit number" maxLength={10}/></div>
            </div>
            <div className="fg-row">
              <div className="fg"><label>Login Username *</label><input value={form.username} onChange={e=>setForm({...form,username:e.target.value})} placeholder="sup_name"/></div>
              <div className="fg"><label>Password *</label><input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Password"/></div>
            </div>
          </>
        )}

        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          {step==='form'&&<button className="btn btn-primary" onClick={save} disabled={busy}>{busy?'Saving...':'✓ Save Supervisor'}</button>}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// ADMIN DASHBOARD
// ═══════════════════════════════════════════════════
function AdminDashboard({user,toast}){
  const[tab,setTab]=useState('overview');
  const[employees,setEmployees]=useState([]);
  const[tokens,setTokens]=useState([]);
  const[supervisors,setSupervisors]=useState([]);
  const[showAddEmp,setShowAddEmp]=useState(false);
  const[showAddSup,setShowAddSup]=useState(false);
  const[searchEmp,setSearchEmp]=useState('');
  const[searchTok,setSearchTok]=useState('');
  const[tokResult,setTokResult]=useState(null);

  const load=async()=>{
    const[e,t,s]=await Promise.all([db.getEmployees(),db.getTokens(),db.getSupervisors()]);
    setEmployees(e);setTokens(t);setSupervisors(s);
  };
  useEffect(()=>{load();},[]);

  const assigned=tokens.filter(t=>t.assignedTo).length;
  const totalToks=employees.reduce((s,e)=>s+(e.totalTokens||0),0);

  const handlePay=async(empId,name)=>{
    if(!window.confirm(`Pay salary and reset tokens for ${name}?`)) return;
    await db.resetEmployee(empId);toast.show('Salary paid & reset!','success');load();
  };

  const handleRemoveEmp=async(id,name)=>{
    if(!window.confirm(`Remove employee ${name}? This cannot be undone.`)) return;
    await db.removeEmployee(id);toast.show('Employee removed','info');load();
  };

  const handleRemoveSup=async(id,name)=>{
    if(!window.confirm(`Remove supervisor ${name}?`)) return;
    await db.removeSupervisor(id);toast.show('Supervisor removed','info');load();
  };

  const handleTokSearch=async()=>{
    if(!searchTok.trim()) return;
    const t=await db.getToken(searchTok.trim().toUpperCase());
    if(!t){setTokResult({error:'Token not found'});return;}
    if(!t.assignedTo){setTokResult({status:'free',token:t});return;}
    const emp=await db.getEmployeeById(t.assignedTo);
    setTokResult({status:'assigned',token:t,employee:emp});
  };

  const fEmps=employees.filter(e=>e.name.toLowerCase().includes(searchEmp.toLowerCase())||e.rollNo.toLowerCase().includes(searchEmp.toLowerCase())||(e.department||'').toLowerCase().includes(searchEmp.toLowerCase()));

  return(
    <div>
      <div className="tabs">
        {['overview','employees','supervisors','tokens','token-search'].map(t=>(
          <button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t.replace('-',' ')}</button>
        ))}
      </div>

      {/* ── OVERVIEW ── */}
      {tab==='overview'&&(
        <>
          <div className="g4 mb14">
            <div className="card"><div className="ct">Employees</div><div className="stat-n">{employees.length}</div><div className="stat-l">registered</div></div>
            <div className="card"><div className="ct">Supervisors</div><div className="stat-n" style={{color:'var(--accent3)'}}>{supervisors.length}</div><div className="stat-l">active</div></div>
            <div className="card"><div className="ct">Tokens Assigned</div><div className="stat-n" style={{color:'var(--accent2)'}}>{assigned}</div><div className="stat-l">of {tokens.length}</div></div>
            <div className="card"><div className="ct">Total Earned</div><div className="stat-n" style={{color:'var(--accent)'}}>{totalToks}</div><div className="stat-l">this period</div></div>
          </div>
          <div className="card">
            <div className="ct">Top earners — current period</div>
            {[...employees].sort((a,b)=>(b.totalTokens||0)-(a.totalTokens||0)).slice(0,6).map(e=>(
              <div key={e.id} className="erow" style={{cursor:'default'}}>
                <div className="avt avt-y">{e.name.charAt(0)}</div>
                <div className="ei"><div className="en">{e.name}</div><div className="er">{e.rollNo} · {e.department}</div></div>
                <div><div className="etok">{e.totalTokens||0}</div><div className="etl">tokens</div></div>
              </div>
            ))}
          </div>
        </>
      )}

      {/* ── EMPLOYEES ── */}
      {tab==='employees'&&(
        <>
          <div className="sh mb14">
            <span className="st">Employee Profiles ({employees.length})</span>
            <button className="btn btn-success btn-sm" onClick={()=>setShowAddEmp(true)}>+ Register Employee</button>
          </div>
          <div className="card">
            <div className="sbar"><input value={searchEmp} onChange={e=>setSearchEmp(e.target.value)} placeholder="Search name, roll no, department..."/></div>
            <div className="tw">
              <table>
                <thead><tr><th>Employee</th><th>Roll No</th><th>Mobile</th><th>Dept</th><th>Tokens</th><th>Paid</th><th>Actions</th></tr></thead>
                <tbody>
                  {fEmps.map(e=>(
                    <tr key={e.id}>
                      <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="avt avt-y" style={{width:28,height:28,fontSize:10}}>{e.name.charAt(0)}</div>{e.name}</div></td>
                      <td className="mc">{e.rollNo}</td>
                      <td className="mc" style={{color:'var(--muted2)'}}>{e.mobile||'—'}</td>
                      <td><span className="badge b-gray">{e.department||'—'}</span></td>
                      <td><span style={{fontFamily:'var(--mono)',color:'var(--accent)'}}>{e.totalTokens||0}</span></td>
                      <td className="mc" style={{color:'var(--muted2)'}}>{e.paidTokens||0}</td>
                      <td>
                        <div style={{display:'flex',gap:6}}>
                          <button className="btn btn-success btn-sm" onClick={()=>handlePay(e.id,e.name)}>Pay & Reset</button>
                          <button className="btn btn-danger btn-sm" onClick={()=>handleRemoveEmp(e.id,e.name)}>Remove</button>
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}

      {/* ── SUPERVISORS ── */}
      {tab==='supervisors'&&(
        <>
          <div className="sh mb14">
            <span className="st">Supervisor Accounts ({supervisors.length})</span>
            <button className="btn btn-success btn-sm" onClick={()=>setShowAddSup(true)}>+ Register Supervisor</button>
          </div>
          <div className="card">
            <div className="tw">
              <table>
                <thead><tr><th>Name</th><th>Supervisor ID</th><th>Mobile</th><th>Username</th><th>QR Card ID</th><th>Status</th><th>Action</th></tr></thead>
                <tbody>
                  {supervisors.map(s=>(
                    <tr key={s.id}>
                      <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="avt avt-p" style={{width:28,height:28,fontSize:10}}>{s.name.charAt(0)}</div>{s.name}</div></td>
                      <td className="mc">{s.supId||s.id}</td>
                      <td className="mc" style={{color:'var(--muted2)'}}>{s.mobile||'—'}</td>
                      <td className="mc">{s.username}</td>
                      <td className="mc" style={{color:'var(--accent3)',fontSize:10}}>{s.qrId}</td>
                      <td><span className="badge b-green">Active</span></td>
                      <td><button className="btn btn-danger btn-sm" onClick={()=>handleRemoveSup(s.id,s.name)}>Remove</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}

      {/* ── TOKENS ── */}
      {tab==='tokens'&&(
        <div className="card">
          <div className="sh">
            <span className="st">Token Pool ({tokens.length})</span>
            <span className="badge b-yellow">{assigned} assigned</span>
          </div>
          <div className="sbar"><input value={searchTok} onChange={e=>{setSearchTok(e.target.value);setTokResult(null);}} placeholder="Search token ID..."/></div>
          <div className="tw">
            <table>
              <thead><tr><th>Token</th><th>Status</th><th>Employee</th><th>Roll No</th><th>Assigned By</th><th>Date</th></tr></thead>
              <tbody>
                {tokens.filter(t=>t.id.includes(searchTok.toUpperCase())||(t.assignedRoll||'').includes(searchTok.toUpperCase())).slice(0,60).map(t=>(
                  <tr key={t.id}>
                    <td className="mc">{t.id}</td>
                    <td><span className={`badge ${t.assignedTo?'b-green':'b-gray'}`}>{t.assignedTo?'Assigned':'Free'}</span></td>
                    <td style={{fontSize:12}}>{t.assignedTo||'—'}</td>
                    <td className="mc">{t.assignedRoll||'—'}</td>
                    <td style={{fontSize:11,color:'var(--muted2)'}}>{t.assignedBy||'—'}</td>
                    <td style={{fontSize:10,color:'var(--muted)'}}>{t.lockedDate||'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── TOKEN SEARCH ── */}
      {tab==='token-search'&&(
        <div className="card">
          <div className="ct">Token Lookup</div>
          <p style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Search any token to see who it belongs to and when it was assigned.</p>
          <div className="sbar">
            <input value={searchTok} onChange={e=>{setSearchTok(e.target.value);setTokResult(null);}} placeholder="TKN000001" onKeyDown={e=>e.key==='Enter'&&handleTokSearch()}/>
            <button className="btn btn-success btn-sm" onClick={handleTokSearch}>Search</button>
          </div>
          {tokResult&&(
            <div style={{marginTop:14}}>
              {tokResult.error&&<div style={{color:'var(--danger)',fontFamily:'var(--mono)',fontSize:12}}>{tokResult.error}</div>}
              {tokResult.status==='free'&&<div className="verify-badge vb-info">Token {tokResult.token.id} — Not yet assigned</div>}
              {tokResult.status==='assigned'&&tokResult.employee&&(
                <div>
                  <div className="verify-badge vb-success">✓ Token {tokResult.token.id} — Assigned</div>
                  <div className="erow" style={{cursor:'default',marginBottom:12}}>
                    <div className="avt avt-y">{tokResult.employee.name.charAt(0)}</div>
                    <div className="ei"><div className="en">{tokResult.employee.name}</div><div className="er">{tokResult.employee.rollNo} · {tokResult.employee.department}</div></div>
                  </div>
                  <div className="g2">
                    <div className="card"><div className="ct">Assigned By</div><div style={{fontSize:13}}>{tokResult.token.assignedBy}</div></div>
                    <div className="card"><div className="ct">Date Locked</div><div style={{fontFamily:'var(--mono)',fontSize:13}}>{tokResult.token.lockedDate}</div></div>
                    <div className="card"><div className="ct">Merged ID</div><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--accent2)'}}>{tokResult.token.id}::{tokResult.token.assignedRoll}</div></div>
                    <div className="card"><div className="ct">Session</div><div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--muted2)'}}>{tokResult.token.sessionId}</div></div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── MODALS ── */}
      {showAddEmp&&<AddEmployeeModal onClose={()=>setShowAddEmp(false)} onSaved={load} toast={toast}/>}
      {showAddSup&&<AddSupervisorModal onClose={()=>setShowAddSup(false)} onSaved={load} toast={toast}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// SUPERVISOR PANEL — Step 1: verify employee, Step 2: scan tokens
// ═══════════════════════════════════════════════════
function SupervisorPanel({user,toast}){
  const[employees,setEmployees]=useState([]);
  const[step,setStep]=useState('verify'); // verify | tokens
  const[verifiedEmp,setVerifiedEmp]=useState(null);
  const[sessionTokens,setSessionTokens]=useState([]);
  const[sessionId]=useState(`SES-${Date.now()}`);
  const[empSearch,setEmpSearch]=useState('');
  const[empCam,setEmpCam]=useState(false);
  const[empManual,setEmpManual]=useState('');
  const[tokCam,setTokCam]=useState(false);
  const[tokManual,setTokManual]=useState('');
  const[tokBusy,setTokBusy]=useState(false);
  const tokInputRef=useRef();

  useEffect(()=>{db.getEmployees().then(setEmployees);},[]);

  // ── STEP 1: verify employee by QR ──
  const verifyEmployee=async(raw)=>{
    setEmpCam(false);
    const rollNo=raw.trim();
    const emp=await db.getEmployeeByRoll(rollNo);
    if(!emp){toast.show('Employee not found for QR: '+rollNo,'error');return;}
    setVerifiedEmp(emp);setStep('tokens');
    toast.show('Employee verified: '+emp.name,'success');
    setTimeout(()=>tokInputRef.current?.focus(),300);
  };

  // ── STEP 2: assign token ──
  const assignToken=async(raw)=>{
    const tokenId=raw.trim().toUpperCase();
    if(!tokenId||!verifiedEmp) return;
    setTokBusy(true);
    try{
      await db.assignToken(tokenId,verifiedEmp.id,verifiedEmp.rollNo,user.name,sessionId);
      const merged=`${tokenId}::${verifiedEmp.rollNo}`;
      setSessionTokens(p=>[...p,{tokenId,merged,at:new Date().toLocaleTimeString()}]);
      setTokManual('');
      // refresh employee token count
      const updated=await db.getEmployeeById(verifiedEmp.id);
      if(updated) setVerifiedEmp(updated);
      toast.show(`✓ ${tokenId} assigned to ${verifiedEmp.name}`,'success');
    }catch(e){toast.show(e.message,'error');}
    finally{setTokBusy(false);setTokCam(false);setTimeout(()=>tokInputRef.current?.focus(),100);}
  };

  const resetSession=()=>{setStep('verify');setVerifiedEmp(null);setSessionTokens([]);setEmpManual('');setTokManual('');};

  const fEmps=employees.filter(e=>e.name.toLowerCase().includes(empSearch.toLowerCase())||e.rollNo.toLowerCase().includes(empSearch.toLowerCase()));

  return(
    <div>
      {/* ── STEP INDICATOR ── */}
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:6,fontFamily:'var(--mono)',fontSize:11}}>
          <div style={{width:24,height:24,borderRadius:'50%',background:step==='verify'?'var(--accent)':'var(--accent2)',color:'#07070d',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>1</div>
          <span style={{color:step==='verify'?'var(--accent)':'var(--accent2)'}}>Verify Employee</span>
        </div>
        <div style={{flex:1,height:1,background:step==='tokens'?'var(--accent2)':'var(--border)'}}/>
        <div style={{display:'flex',alignItems:'center',gap:6,fontFamily:'var(--mono)',fontSize:11}}>
          <div style={{width:24,height:24,borderRadius:'50%',background:step==='tokens'?'var(--accent2)':'var(--border2)',color:step==='tokens'?'#07070d':'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700}}>2</div>
          <span style={{color:step==='tokens'?'var(--accent2)':'var(--muted)'}}>Assign Tokens</span>
        </div>
        {verifiedEmp&&<button className="btn btn-ghost btn-sm" onClick={resetSession}>↩ New Employee</button>}
      </div>

      {/* ── STEP 1: VERIFY ── */}
      {step==='verify'&&(
        <div className="g2">
          <div>
            <div className="card">
              <div className="ct">Scan Employee QR Card</div>
              {empCam?(
                <CamScanner onScan={verifyEmployee} onClose={()=>setEmpCam(false)} label="Scan employee QR card..."/>
              ):(
                <div className="scanbox">
                  <div className="scan-icon">🪪</div>
                  <div className="scan-hint">Scan the employee's physical QR card to verify them</div>
                  <input className="scan-input" value={empManual} onChange={e=>setEmpManual(e.target.value)} onKeyDown={e=>e.key==='Enter'&&verifyEmployee(empManual)} placeholder="Roll No / QR Value" autoFocus/>
                  <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:12}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setEmpCam(true)}>📷 Camera</button>
                    <button className="btn btn-success btn-sm" onClick={()=>verifyEmployee(empManual)} disabled={!empManual.trim()}>Verify →</button>
                  </div>
                </div>
              )}
            </div>
          </div>
          <div>
            <div className="card">
              <div className="ct">Or select from list</div>
              <div className="sbar"><input value={empSearch} onChange={e=>setEmpSearch(e.target.value)} placeholder="Search employee..."/></div>
              <div style={{maxHeight:320,overflowY:'auto'}}>
                {fEmps.map(e=>(
                  <div key={e.id} className="erow" onClick={()=>verifyEmployee(e.rollNo)}>
                    <div className="avt avt-y">{e.name.charAt(0)}</div>
                    <div className="ei"><div className="en">{e.name}</div><div className="er">{e.rollNo}</div></div>
                    <div><div className="etok" style={{fontSize:13}}>{e.totalTokens||0}</div><div className="etl">tokens</div></div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── STEP 2: ASSIGN TOKENS ── */}
      {step==='tokens'&&verifiedEmp&&(
        <div className="g2">
          <div>
            {/* Verified employee card */}
            <div className="card mb14" style={{borderColor:'var(--accent2)'}}>
              <div className="verify-badge vb-success pop" style={{marginBottom:14}}>✓ Employee Verified</div>
              <div className="erow" style={{cursor:'default'}}>
                <div className="avt avt-g">{verifiedEmp.name.charAt(0)}</div>
                <div className="ei">
                  <div className="en">{verifiedEmp.name}</div>
                  <div className="er">{verifiedEmp.rollNo} · {verifiedEmp.department}</div>
                  {verifiedEmp.mobile&&<div className="er">📞 {verifiedEmp.mobile}</div>}
                </div>
                <div><div className="etok">{verifiedEmp.totalTokens||0}</div><div className="etl">tokens</div></div>
              </div>
            </div>

            {/* Scan token */}
            <div className="card">
              <div className="ct">Scan Token QR</div>
              {tokCam?(
                <CamScanner onScan={assignToken} onClose={()=>setTokCam(false)} label="Scan token QR code..."/>
              ):(
                <div className={`scanbox ${tokManual?'live':''}`}>
                  <div className="scan-icon">🎟️</div>
                  <div className="scan-hint">Merging token with <strong style={{color:'var(--accent2)'}}>{verifiedEmp.rollNo}</strong></div>
                  <input ref={tokInputRef} className="scan-input" value={tokManual} onChange={e=>setTokManual(e.target.value)} onKeyDown={e=>e.key==='Enter'&&assignToken(tokManual)} placeholder="TKN000001" autoFocus/>
                  <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:12}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setTokCam(true)}>📷 Camera</button>
                    <button className="btn btn-success btn-sm" onClick={()=>assignToken(tokManual)} disabled={tokBusy||!tokManual.trim()}>
                      {tokBusy?'Assigning...':'✓ Assign Token'}
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* Session log */}
          <div>
            <div className="card">
              <div className="sh">
                <div className="ct" style={{margin:0}}>Session Log</div>
                <span className="badge b-yellow">{sessionTokens.length} assigned</span>
              </div>
              {sessionTokens.length===0?(
                <div style={{textAlign:'center',padding:32,color:'var(--muted)',fontSize:13}}>No tokens assigned yet this session</div>
              ):(
                <div style={{maxHeight:360,overflowY:'auto'}}>
                  {[...sessionTokens].reverse().map((t,i)=>(
                    <div key={i} className="slog-item">
                      <span className="mc" style={{color:'var(--accent2)'}}>{t.tokenId}</span>
                      <span style={{color:'var(--muted)',fontSize:10}}>{t.at}</span>
                    </div>
                  ))}
                </div>
              )}
              {sessionTokens.length>0&&(
                <div style={{marginTop:12,fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)'}}>
                  Session: {sessionId}<br/>
                  All tokens merged with {verifiedEmp.rollNo}
                </div>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════
function App(){
  const[user,setUser]=useState(null);
  const toast=useToast();
  return(
    <div className="app">
      {!user?<Login onLogin={setUser}/>:(
        <>
          <div className="topbar">
            <div className="brand"><div className="brand-dot"/>TOKENPAY</div>
            <div className="topbar-r">
              <span style={{fontSize:12,color:'var(--muted2)'}}>{user.name}</span>
              <span className={`rbadge ${user.role}`}>{user.role.toUpperCase()}</span>
              <button className="btn-out" onClick={()=>setUser(null)}>LOGOUT</button>
            </div>
          </div>
          <div className="main">
            <div className="demo-banner">⚡ DEMO MODE — Connect Firebase to persist data. Camera QR scanning needs HTTPS.</div>
            {user.role==='admin'
              ?<AdminDashboard user={user} toast={toast}/>
              :<SupervisorPanel user={user} toast={toast}/>
            }
          </div>
        </>
      )}
      <div className="toast-wrap">
        {toast.toasts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
