<style>
:root {
  --bg:#0a0a0f; --surface:#13131a; --surface2:#1c1c27;

*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* LAYOUT */
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-family:var(--mono);font-size:14px;color:var(--accent);letter-spacing:2px}
.topbar-right{display:flex;align-items:center;gap:10px}
.role-badge{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--muted);letter-spacing:1px}
.role-badge.admin{border-color:var(--accent);color:var(--accent)}
.role-badge.supervisor{border-color:var(--accent2);color:var(--accent2)}

.btn-logout:hover{border-color:var(--danger);color:var(--danger)}
.main{flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:100%;max-width:370px}
.login-title{font-family:var(--mono);font-size:20px;color:var(--accent);letter-spacing:2px;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:28px}
.fg{margin-bottom:14px}

.fg input,.fg select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border .2s}
.fg input:focus,.fg select:focus{border-color:var(--accent)}

.btn-primary:hover{opacity:.85}

/* TABS */

/* SECTION */

/* SCAN BOX */

.scan-input{width:100%;max-width:240px;background:var(--surface2);border:1px solid var(--accent);border-radius:6px;padding:9px 12px;color:var(--text);font-family:var(--mono);font-size:13px;outline:none;text-align:center;letter-spacing:2px}

/* TOASTS */
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:7px;z-index:300}
.toast{font-size:12px;padding:10px 16px;border-radius:7px;border:1px solid;animation:slideIn .2s ease;max-width:280px;font-family:var(--sans)}

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ═══════════════════════════════════════════
// DEMO DATA
// ═══════════════════════════════════════════
let demoData = (() => {
  const names = ["Arun Kumar","Priya Sharma","Karthik R","Deepa M","Suresh P","Lakshmi N","Rajesh V","Meena S","Vijay K","Anitha R","Murugan T","Sangeetha B","Prakash D","Kavitha L","Senthil A","Nalini J","Balamurugan S","Revathi C","Dinesh M","Pooja G"];
  const depts = ["Production","Packing","Quality","Warehouse","Maintenance"];
  const employees = names.map((name,i) => ({
    id:`EMP${String(i+1).padStart(3,'0')}`,name,rollNo:`ROLL${String(i+1).padStart(4,'0')}`,
    department:depts[i%5],tokens:[],totalTokens:Math.floor(Math.random()*20),paidTokens:Math.floor(Math.random()*100)
  }));
  const tokens = Array.from({length:200},(_,i)=>({
    id:`TKN${String(i+1).padStart(6,'0')}`,assignedTo:null,assignedRoll:null,assignedAt:null,assignedBy:null,sessionId:null
  }));
  const supervisors = [
    {id:'SUP001',name:'Supervisor Alpha',username:'sup1',password:'pass1',active:true},
    {id:'SUP002',name:'Supervisor Beta',username:'sup2',password:'pass2',active:true},
  ];
  return {employees,tokens,supervisors};
})();

const db = {
  login: async (u, p) => {
    const snap = await firestore.collection('supervisors').where('username','==',u).where('password','==',p).get();
    if(u==='admin'&&p==='admin123') return {role:'admin',name:'Administrator',id:'ADMIN'};
    if(snap.empty) throw new Error('Invalid credentials');
    const s = snap.docs[0].data();
    return {role:'supervisor', name:s.name, id:snap.docs[0].id};
  },
  getEmployees: () => firestore.collection('employees').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))),
  getEmployee: (id) => firestore.collection('employees').doc(id).get().then(d=>({id:d.id,...d.data()})),
  addEmployee: (emp) => firestore.collection('employees').doc(emp.id).set(emp),
  getTokens: () => firestore.collection('tokens').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))),
  getToken: (id) => firestore.collection('tokens').doc(id).get().then(d=>d.exists?{id:d.id,...d.data()}:null),
  assignToken: async (tokenId, empId, rollNo, supName, sessionId) => {
    return firestore.runTransaction(async tx => {
      const tRef = firestore.collection('tokens').doc(tokenId);
      const eRef = firestore.collection('employees').doc(empId);
      const tDoc = await tx.get(tRef);
      if(!tDoc.exists) throw new Error('Token not found');
      if(tDoc.data().assignedTo) throw new Error('Token already assigned');
      tx.update(tRef, {assignedTo:empId, assignedRoll:rollNo, assignedAt:new Date().toISOString(), assignedBy:supName, sessionId});
      tx.update(eRef, {totalTokens: firebase.firestore.FieldValue.increment(1), tokens: firebase.firestore.FieldValue.arrayUnion(tokenId)});
    });
  },
  resetEmployee: async (id) => {
    const eRef = firestore.collection('employees').doc(id);
    const eDoc = await eRef.get();
    const emp = eDoc.data();
    const batch = firestore.batch();
    (emp.tokens||[]).forEach(tid => batch.update(firestore.collection('tokens').doc(tid), {assignedTo:null,assignedRoll:null,assignedAt:null,assignedBy:null,sessionId:null}));
    batch.update(eRef, {paidTokens: firebase.firestore.FieldValue.increment(emp.totalTokens||0), tokens:[], totalTokens:0});
    return batch.commit();
  },
  getSupervisors: () => firestore.collection('supervisors').get().then(s=>s.docs.map(d=>({id:d.id,...d.data()}))),
  addSupervisor: (s) => firestore.collection('supervisors').doc(s.id).set(s),
  removeSupervisor: (id) => firestore.collection('supervisors').doc(id).delete(),
};


// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function useToast(){
  const[toasts,setToasts]=useState([]);
  const show=(msg,type='info')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  };
  return{toasts,show};
}

// ═══════════════════════════════════════════
// QR MODAL
// ═══════════════════════════════════════════
function QRModal({tokenId,onClose}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.QRCode){
      ref.current.innerHTML='';
      new window.QRCode(ref.current,{text:tokenId,width:180,height:180,colorDark:"#000000",colorLight:"#ffffff"});
    }
  },[tokenId]);
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">TOKEN QR CODE</div>
        <div className="qr-wrap"><div ref={ref}/></div>
        <div className="td"><span>Token ID</span>{tokenId}</div>
        <div className="td"><span>Instructions</span>Supervisor scans this QR to assign token to employee</div>
        <div style={{display:'flex',gap:8,marginTop:10}}>
          <button className="bsm" style={{flex:1}} onClick={onClose}>CLOSE</button>
          <button className="bsm ok" style={{flex:1}} onClick={()=>window.print()}>PRINT</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// CAMERA QR SCANNER COMPONENT
// ═══════════════════════════════════════════
function CameraScanner({onScan,onClose}){
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);
  const animRef=useRef(null);
  const[status,setStatus]=useState('Initializing camera...');
  const[camError,setCamError]=useState(null);
  const[lastScan,setLastScan]=useState(null);

  useEffect(()=>{
    startCamera();
    return()=>stopCamera();
  },[]);

  const startCamera=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({
        video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
      });
      streamRef.current=stream;
      if(videoRef.current){
        videoRef.current.srcObject=stream;
        videoRef.current.play();
        setStatus('Point camera at token QR code...');
        requestAnimationFrame(tick);
      }
    }catch(e){
      setCamError('Camera access denied. Please allow camera access or use manual input below.');
    }
  };

  const stopCamera=()=>{
    if(streamRef.current) streamRef.current.getTracks().forEach(t=>t.stop());
    if(animRef.current) cancelAnimationFrame(animRef.current);
  };

  const tick=()=>{
    const video=videoRef.current;
    const canvas=canvasRef.current;
    if(!video||!canvas) return;
    if(video.readyState===video.HAVE_ENOUGH_DATA){
      canvas.width=video.videoWidth;
      canvas.height=video.videoHeight;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
      if(window.jsQR){
        const code=window.jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:'dontInvert'});
        if(code&&code.data&&code.data!==lastScan){
          setLastScan(code.data);
          setStatus(`✅ Scanned: ${code.data}`);
          onScan(code.data);
          setTimeout(()=>{setLastScan(null);setStatus('Ready for next scan...');},2000);
        }
      }
    }
    animRef.current=requestAnimationFrame(tick);
  };

  return(
    <div style={{marginBottom:16}}>
      <div className="cam-wrap">
        {camError?(
          <div style={{padding:40,textAlign:'center',color:'var(--danger)',fontSize:13}}>{camError}</div>
        ):(
          <>
            <video ref={videoRef} playsInline muted style={{width:'100%',maxHeight:260,objectFit:'cover',display:'block'}}/>
            <canvas ref={canvasRef} style={{display:'none'}}/>
            <div className="cam-overlay">
              <div className="cam-frame"/>
              <div className="cam-scan-line" style={{position:'absolute'}}/>
            </div>
            <div className="cam-status">{status}</div>
          </>
        )}
      </div>
      <button className="bsm danger" onClick={()=>{stopCamera();onClose();}}>✕ CLOSE CAMERA</button>
    </div>
  );
}

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
function Login({onLogin}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');const[loading,setLoading]=useState(false);
  const submit=async()=>{
    if(!u||!p){setErr('Enter username and password');return;}
    setLoading(true);setErr('');
    try{const user=await db.login(u.trim(),p);onLogin(user);}
    catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };
  return(
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-title">⬡ TOKENPAY</div>
        <div className="login-sub">Workforce Token Management System v2</div>
        <div className="fg"><label>Username</label><input value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="admin / sup1 / sup2" autoFocus/></div>
        <div className="fg"><label>Password</label><input type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="••••••••"/></div>
        <button className="btn-primary" onClick={submit} disabled={loading}>{loading?'SIGNING IN...':'SIGN IN'}</button>
        {err&&<div className="err">{err}</div>}
        <div style={{marginTop:16,fontSize:10,color:'var(--muted)',textAlign:'center',fontFamily:'var(--mono)'}}>DEMO · admin/admin123 · sup1/pass1 · sup2/pass2</div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// ADMIN DASHBOARD
// ═══════════════════════════════════════════
function AdminDashboard({user,toast}){
  const[tab,setTab]=useState('overview');
  const[employees,setEmployees]=useState([]);
  const[tokens,setTokens]=useState([]);
  const[supervisors,setSupervisors]=useState([]);
  const[qrToken,setQrToken]=useState(null);
  const[searchEmp,setSearchEmp]=useState('');
  const[searchTok,setSearchTok]=useState('');
  const[tokResult,setTokResult]=useState(null);
  const[empForm,setEmpForm]=useState({name:'',rollNo:'',department:''});
  const[supForm,setSupForm]=useState({name:'',username:'',password:''});

  const load=async()=>{
    const[e,t,s]=await Promise.all([db.getEmployees(),db.getTokens(),db.getSupervisors()]);
    setEmployees(e);setTokens(t);setSupervisors(s);
  };
  useEffect(()=>{load();},[]);

  const assigned=tokens.filter(t=>t.assignedTo).length;

  const handlePay=async(empId)=>{
    if(!window.confirm('Confirm salary paid & reset tokens?')) return;
    await db.resetEmployee(empId);
    toast.show('Salary paid & profile reset!','success');load();
  };

  const handleTokSearch=async()=>{
    if(!searchTok.trim()) return;
    const t=await db.getToken(searchTok.trim().toUpperCase());
    if(!t){setTokResult({error:'Token not found'});return;}
    if(!t.assignedTo){setTokResult({status:'free',token:t});return;}
    const emp=await db.getEmployee(t.assignedTo);
    setTokResult({status:'assigned',token:t,employee:emp});
  };

  const handleAddEmp=async()=>{
    const{name,rollNo,department}=empForm;
    if(!name||!rollNo){toast.show('Name and Roll No required','error');return;}
    if(employees.find(e=>e.rollNo===rollNo)){toast.show('Roll No already exists','error');return;}
    const id=`EMP${String(employees.length+1).padStart(3,'0')}`;
    await db.addEmployee({id,name,rollNo,department,tokens:[],totalTokens:0,paidTokens:0});
    toast.show('Employee added!','success');
    setEmpForm({name:'',rollNo:'',department:''});load();
  };

  const handleAddSup=async()=>{
    const{name,username,password}=supForm;
    if(!name||!username||!password){toast.show('All fields required','error');return;}
    if(supervisors.find(s=>s.username===username)){toast.show('Username taken','error');return;}
    const id=`SUP${String(supervisors.length+1).padStart(3,'0')}`;
    await db.addSupervisor({id,name,username,password,active:true});
    toast.show('Supervisor created!','success');
    setSupForm({name:'',username:'',password:''});load();
  };

  const fEmps=employees.filter(e=>e.name.toLowerCase().includes(searchEmp.toLowerCase())||e.rollNo.toLowerCase().includes(searchEmp.toLowerCase())||(e.department||'').toLowerCase().includes(searchEmp.toLowerCase()));
  const fToks=tokens.filter(t=>t.id.toLowerCase().includes(searchTok.toLowerCase())||(t.assignedRoll||'').toLowerCase().includes(searchTok.toLowerCase())).slice(0,60);

  return(
    <div>
      <div className="tabs">
        {['overview','employees','tokens','supervisors','token-search'].map(t=>(
          <button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t.replace('-',' ')}</button>
        ))}
      </div>

      {tab==='overview'&&(
        <div>
          <div className="g3" style={{marginBottom:16}}>
            <div className="card"><div className="ct">Employees</div><div className="stat-n">{employees.length}</div><div className="stat-l">profiles</div></div>
            <div className="card"><div className="ct">Tokens Assigned</div><div className="stat-n" style={{color:'var(--accent2)'}}>{assigned}</div><div className="stat-l">of {tokens.length}</div></div>
            <div className="card"><div className="ct">Supervisors</div><div className="stat-n" style={{color:'var(--muted)'}}>{supervisors.length}</div><div className="stat-l">active accounts</div></div>
          </div>
          <div className="card">
            <div className="ct">Top Earners — Current Period</div>
            {[...employees].sort((a,b)=>(b.totalTokens||0)-(a.totalTokens||0)).slice(0,8).map(emp=>(
              <div key={emp.id} className="ecard" style={{cursor:'default'}}>
                <div className="avt">{emp.name.charAt(0)}</div>
                <div className="ei"><div className="en">{emp.name}</div><div className="er">{emp.rollNo} · {emp.department}</div></div>
                <div><div className="etok">{emp.totalTokens||0}</div><div className="etl">TOKENS</div></div>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==='employees'&&(
        <div>
          <div className="card" style={{marginBottom:14}}>
            <div className="ct">Add New Employee</div>
            <div className="g3">
              <div className="fg"><label>Full Name</label><input value={empForm.name} onChange={e=>setEmpForm({...empForm,name:e.target.value})} placeholder="Employee name"/></div>
              <div className="fg"><label>Roll Number</label><input value={empForm.rollNo} onChange={e=>setEmpForm({...empForm,rollNo:e.target.value})} placeholder="ROLL0001"/></div>
              <div className="fg"><label>Department</label><input value={empForm.department} onChange={e=>setEmpForm({...empForm,department:e.target.value})} placeholder="Production"/></div>
            </div>
            <button className="bsm ok" onClick={handleAddEmp}>+ ADD EMPLOYEE</button>
          </div>
          <div className="card">
            <div className="sh"><div className="st">Profiles ({employees.length})</div></div>
            <div className="sbar"><input value={searchEmp} onChange={e=>setSearchEmp(e.target.value)} placeholder="Search name, roll no, department..."/></div>
            <div className="tw">
              <table>
                <thead><tr><th>Employee</th><th>Roll No</th><th>Dept</th><th>Tokens</th><th>All-time Paid</th><th>Action</th></tr></thead>
                <tbody>
                  {fEmps.map(emp=>(
                    <tr key={emp.id}>
                      <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="avt" style={{width:28,height:28,fontSize:10}}>{emp.name.charAt(0)}</div>{emp.name}</div></td>
                      <td className="mc">{emp.rollNo}</td>
                      <td><span className="badge bx">{emp.department||'—'}</span></td>
                      <td><span className="mc" style={{color:'var(--accent)'}}>{emp.totalTokens||0}</span></td>
                      <td className="mc" style={{color:'var(--muted)'}}>{emp.paidTokens||0}</td>
                      <td><button className="bsm ok" onClick={()=>handlePay(emp.id)}>PAY & RESET</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==='tokens'&&(
        <div className="card">
          <div className="sh"><div className="st">Token Pool ({tokens.length})</div><span className="badge by">{assigned} ASSIGNED</span></div>
          <div className="sbar"><input value={searchTok} onChange={e=>setSearchTok(e.target.value)} placeholder="Search token ID or roll no..."/></div>
          <div className="tw">
            <table>
              <thead><tr><th>Token ID</th><th>Status</th><th>Employee</th><th>Roll No</th><th>Assigned By</th><th>Date</th><th>QR</th></tr></thead>
              <tbody>
                {fToks.map(tok=>(
                  <tr key={tok.id}>
                    <td className="mc">{tok.id}</td>
                    <td><span className={`badge ${tok.assignedTo?'bg':'bx'}`}>{tok.assignedTo?'ASSIGNED':'FREE'}</span></td>
                    <td style={{fontSize:12}}>{tok.assignedTo||'—'}</td>
                    <td className="mc">{tok.assignedRoll||'—'}</td>
                    <td style={{fontSize:11,color:'var(--muted)'}}>{tok.assignedBy||'—'}</td>
                    <td style={{fontSize:10,color:'var(--muted)'}}>{tok.assignedAt?new Date(tok.assignedAt).toLocaleDateString():'—'}</td>
                    <td><button className="bsm" onClick={()=>setQrToken(tok.id)}>QR</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{fontSize:10,color:'var(--muted)',marginTop:10,fontFamily:'var(--mono)'}}>Showing first 60. Use search to filter.</div>
        </div>
      )}

      {tab==='supervisors'&&(
        <div>
          <div className="card" style={{marginBottom:14}}>
            <div className="ct">Create Supervisor Account</div>
            <div className="g3">
              <div className="fg"><label>Full Name</label><input value={supForm.name} onChange={e=>setSupForm({...supForm,name:e.target.value})} placeholder="Supervisor name"/></div>
              <div className="fg"><label>Username</label><input value={supForm.username} onChange={e=>setSupForm({...supForm,username:e.target.value})} placeholder="sup_name"/></div>
              <div className="fg"><label>Password</label><input type="password" value={supForm.password} onChange={e=>setSupForm({...supForm,password:e.target.value})} placeholder="Password"/></div>
            </div>
            <button className="bsm ok" onClick={handleAddSup}>+ CREATE SUPERVISOR</button>
          </div>
          <div className="card">
            <div className="ct">Supervisor Accounts ({supervisors.length})</div>
            <div className="tw">
              <table>
                <thead><tr><th>ID</th><th>Name</th><th>Username</th><th>Status</th><th>Action</th></tr></thead>
                <tbody>
                  {supervisors.map(sup=>(
                    <tr key={sup.id}>
                      <td className="mc">{sup.id}</td>
                      <td>{sup.name}</td>
                      <td className="mc">{sup.username}</td>
                      <td><span className="badge bg">ACTIVE</span></td>
                      <td><button className="bsm danger" onClick={async()=>{await db.removeSupervisor(sup.id);toast.show('Removed','info');load();}}>REMOVE</button></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==='token-search'&&(
        <div className="card">
          <div className="ct">Token Lookup</div>
          <p style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Enter any token ID to see its full assignment history and current owner.</p>
          <div className="sbar">
            <input value={searchTok} onChange={e=>{setSearchTok(e.target.value);setTokResult(null);}} placeholder="TKN000001" onKeyDown={e=>e.key==='Enter'&&handleTokSearch()}/>
            <button className="bsm ok" onClick={handleTokSearch}>SEARCH</button>
          </div>
          {tokResult&&(
            <div style={{marginTop:14}}>
              {tokResult.error&&<div style={{color:'var(--danger)',fontFamily:'var(--mono)',fontSize:12}}>{tokResult.error}</div>}
              {tokResult.status==='free'&&(
                <div className="card" style={{borderColor:'var(--border)'}}>
                  <div className="mc" style={{color:'var(--accent)',marginBottom:8}}>{tokResult.token.id}</div>
                  <span className="badge bx">NOT ASSIGNED</span>
                  <div style={{fontSize:12,color:'var(--muted)',marginTop:8}}>This token is available and has not been assigned to any employee.</div>
                </div>
              )}
              {tokResult.status==='assigned'&&tokResult.employee&&(
                <div className="card" style={{borderColor:'var(--accent2)'}}>
                  <div className="mc" style={{color:'var(--accent)',marginBottom:12}}>{tokResult.token.id}</div>
                  <div className="ecard" style={{marginBottom:12,cursor:'default'}}>
                    <div className="avt">{tokResult.employee.name.charAt(0)}</div>
                    <div className="ei"><div className="en">{tokResult.employee.name}</div><div className="er">{tokResult.employee.rollNo} · {tokResult.employee.department}</div></div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                    <div className="td"><span>Assigned By</span>{tokResult.token.assignedBy}</div>
                    <div className="td"><span>Assigned At</span>{new Date(tokResult.token.assignedAt).toLocaleString()}</div>
                    <div className="td"><span>Session ID</span>{tokResult.token.sessionId}</div>
                    <div className="td"><span>Merged ID</span>{tokResult.token.id}::{tokResult.token.assignedRoll}</div>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {qrToken&&<QRModal tokenId={qrToken} onClose={()=>setQrToken(null)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════
// SUPERVISOR PANEL
// ═══════════════════════════════════════════
function SupervisorPanel({user,toast}){
  const[employees,setEmployees]=useState([]);
  const[manualInput,setManualInput]=useState('');
  const[selectedEmp,setSelectedEmp]=useState(null);
  const[sessionTokens,setSessionTokens]=useState([]);
  const[sessionId]=useState(`SES-${Date.now()}`);
  const[empSearch,setEmpSearch]=useState('');
  const[cameraOpen,setCameraOpen]=useState(false);
  const[cardFlash,setCardFlash]=useState(false);
  const scanInputRef=useRef(null);

  useEffect(()=>{db.getEmployees().then(setEmployees);},[]);

  const processToken=async(rawValue)=>{
    const tokenId=rawValue.trim().toUpperCase();
    if(!tokenId) return;
    if(!selectedEmp){toast.show('Select an employee first!','error');return;}
    try{
      await db.assignToken(tokenId,selectedEmp.id,selectedEmp.rollNo,user.name,sessionId);
      const merged=`${tokenId}::${selectedEmp.rollNo}`;
      setSessionTokens(prev=>[...prev,{tokenId,merged,empName:selectedEmp.name,at:new Date().toLocaleTimeString()}]);
      setManualInput('');
      // refresh emp
      const updated=await db.getEmployee(selectedEmp.id);
      if(updated) setSelectedEmp(updated);
      toast.show(`✅ ${tokenId} → ${selectedEmp.name}`,'success');
      // flash
      setCardFlash(true);setTimeout(()=>setCardFlash(false),600);
    }catch(e){
      toast.show(e.message,'error');
      setManualInput('');
    }
    setTimeout(()=>scanInputRef.current?.focus(),100);
  };

  const fEmps=employees.filter(e=>
    e.name.toLowerCase().includes(empSearch.toLowerCase())||
    e.rollNo.toLowerCase().includes(empSearch.toLowerCase())
  );

  return(
    <div>
      <div className="g2">
        {/* LEFT: Employee list */}
        <div>
          <div className="card">
            <div className="ct">Select Employee</div>
            <div className="sbar" style={{marginBottom:10}}>
              <input value={empSearch} onChange={e=>setEmpSearch(e.target.value)} placeholder="Search employee..."/>
            </div>
            <div style={{maxHeight:340,overflowY:'auto'}}>
              {fEmps.map(emp=>(
                <div key={emp.id} className={`ecard ${selectedEmp?.id===emp.id?'sel':''}`} onClick={()=>setSelectedEmp(emp)}>
                  <div className={`avt ${selectedEmp?.id===emp.id?'sup':''}`}>{emp.name.charAt(0)}</div>
                  <div className="ei"><div className="en">{emp.name}</div><div className="er">{emp.rollNo}</div></div>
                  <div><div className="etok" style={{fontSize:13}}>{emp.totalTokens||0}</div><div className="etl">TOKENS</div></div>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* RIGHT: Scan zone */}
        <div>
          {selectedEmp?(
            <>
              <div className={`card ${cardFlash?'flash-success':''}`} style={{marginBottom:14,borderColor:'var(--accent2)'}}>
                <div className="ct">Active Employee</div>
                <div className="ecard" style={{cursor:'default',marginBottom:0}}>
                  <div className="avt sup">{selectedEmp.name.charAt(0)}</div>
                  <div className="ei"><div className="en">{selectedEmp.name}</div><div className="er">{selectedEmp.rollNo} · {selectedEmp.department}</div></div>
                  <div><div className="etok">{selectedEmp.totalTokens||0}</div><div className="etl">TOKENS</div></div>
                </div>
              </div>

              {/* Camera scanner */}
              {cameraOpen?(
                <CameraScanner
                  onScan={(val)=>processToken(val)}
                  onClose={()=>setCameraOpen(false)}
                />
              ):(
                <div className={`scanbox ${manualInput?'live':''}`}>
                  <div className="sicon">📷</div>
                  <p>Scan QR with camera or type token ID. Merges with <strong>{selectedEmp.rollNo}</strong></p>
                  <input
                    ref={scanInputRef}
                    className="scan-input"
                    value={manualInput}
                    onChange={e=>setManualInput(e.target.value)}
                    onKeyDown={e=>e.key==='Enter'&&processToken(manualInput)}
                    placeholder="TKN000001"
                    autoFocus
                  />
                  <div style={{display:'flex',gap:8,justifyContent:'center',marginTop:12,flexWrap:'wrap'}}>
                    <button className="bsm ok" onClick={()=>processToken(manualInput)} disabled={!manualInput.trim()}>✓ ASSIGN TOKEN</button>
                    <button className="bsm" onClick={()=>setCameraOpen(true)}>📷 OPEN CAMERA</button>
                  </div>
                </div>
              )}

              {/* Session log */}
              {sessionTokens.length>0&&(
                <div className="card" style={{marginTop:14}}>
                  <div className="sh">
                    <div className="ct" style={{margin:0}}>Session Log</div>
                    <span className="badge by">{sessionTokens.length} TOKENS</span>
                  </div>
                  <div style={{maxHeight:220,overflowY:'auto'}}>
                    {[...sessionTokens].reverse().map((t,i)=>(
                      <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>
                        <span className="mc" style={{color:'var(--accent2)'}}>{t.tokenId}</span>
                        <span style={{color:'var(--muted)',fontSize:11,flex:1,margin:'0 8px'}}>→ {t.empName}</span>
                        <span style={{color:'var(--muted)',fontSize:10}}>{t.at}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{marginTop:10,fontSize:10,color:'var(--muted)',fontFamily:'var(--mono)'}}>
                    SESSION: {sessionId}
                  </div>
                </div>
              )}
            </>
          ):(
            <div className="card" style={{textAlign:'center',padding:48}}>
              <div style={{fontSize:40,marginBottom:14}}>👈</div>
              <div style={{color:'var(--muted)',fontSize:13}}>Select an employee from the left to start assigning tokens</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
// APP
// ═══════════════════════════════════════════
function App(){
  const[user,setUser]=useState(null);
  const toast=useToast();
  return(
    <div className="app">
      {!user?(
        <Login onLogin={setUser}/>
      ):(
        <>
          <div className="topbar">
            <div className="brand">⬡ TOKENPAY</div>
            <div className="topbar-right">
              <span style={{fontSize:12,color:'var(--muted)'}}>{user.name}</span>
              <span className={`role-badge ${user.role}`}>{user.role.toUpperCase()}</span>
              <button className="btn-logout" onClick={()=>setUser(null)}>LOGOUT</button>
            </div>
          </div>
          <div className="main">
            <div className="demo-banner">
              ⚡ DEMO MODE — Data resets on refresh. See <code>firebase-setup.html</code> to connect real database. Camera QR scanning requires HTTPS.
            </div>
            {user.role==='admin'?(
              <AdminDashboard user={user} toast={toast}/>
            ):(
              <SupervisorPanel user={user} toast={toast}/>
            )}
          </div>
        </>
      )}
      <div className="toast-wrap">
        {toast.toasts.map(t=>(
          <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
